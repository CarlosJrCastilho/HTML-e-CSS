<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <H1>Imagem dinâmica</H1>
    <p>Tente abrir esse site em vários dispositivos diferentes</p>
    <p>Você também pode aumentar ou diminuir o tamanho do seu navegador</p>

    <picture>
         <source media="(max-width: 750px)" srcset="Imagens/imagemP.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="Imagens/imagemM.png" type="image/png">
        <img src="Imagens/ImagemG.png" alt="imagem flexível">
    </picture>
    
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <audio src="midia/ResolutionOrReflection-TheGreyRoom _ Clark Sims.mp3" controls autoplay></audio>
</body>
</html>
